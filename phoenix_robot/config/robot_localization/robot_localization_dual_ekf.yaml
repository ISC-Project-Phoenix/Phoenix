ekf_filter_node_odom:
  ros__parameters:
    frequency: 30.0
    two_d_mode: true
    publish_tf: true
    
    # Frame configuration
    map_frame: map
    odom_frame: odom
    base_link_frame: base_footprint #
    world_frame: odom # Only local data fused

    # Continuous Inputs
    odom0: /odom_can #
    odom0_config: [false, false, false, 
                  false, false, false, 
                  true, true, false, 
                  false, false, false, 
                  false, false, false] 
                  # x y z
                  # r p y
                  # vx vy vz
                  # vr vp vy
                  # ax ay az
    
    imu0: /phoenix/gps/imu #
    imu0_config: [false, false, false, 
                true, true, true, 
                false, false, false, 
                true, true, true, 
                true, true, true] 
    imu0_remove_gravitational_acceleration: true 

ekf_filter_node_map:
  ros__parameters:
    frequency: 30.0
    two_d_mode: true
    publish_tf: true
    
    # Frame configuration
    map_frame: map
    odom_frame: odom
    base_link_frame: base_footprint
    world_frame: map # Global frame for GPS fusion

    # Inputs (Same as odom + GPS)
    odom0: /odom_can
    odom0_config: [false, false, false, # x y z
                  false, false, false,  # x y z
                  true, true, false,    # vx vy vz
                  false, false, false,  # vr vp vy
                  false, false, false]  # ax ay az
    
    imu0: /phoenix/gps/imu
    imu0_config: [false, false, false, 
                  true, true, true, 
                  false, false, false, 
                  true, true, true, 
                  true, true, true]
    imu0_relative: false # Use absolute IMU data for global EKF
    
    # GPS Odometry produced by NavSat Transform
    odom1: /odometry/gps
    odom1_config: [true,  true,  false, # X, Y (Global position)
                   false, false, false, 
                   false, false, false, 
                   false, false, false, 
                   false, false, false]
    odom1_differential: false